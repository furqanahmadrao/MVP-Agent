name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

jobs:
  claude-review:
    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better context

      - name: Setup Claude Code Router
        run: |
          curl -fsSL https://bun.sh/install | bash
          mkdir -p $HOME/.claude-code-router
          cat << 'EOF' > $HOME/.claude-code-router/config.json
          {
            "LOG": true,
            "LOG_LEVEL": "info",
            "NON_INTERACTIVE_MODE": true,
            "API_TIMEOUT_MS": 600000,
            "Providers": [
              {
                "name": "gemini",
                "api_base_url": "https://generativelanguage.googleapis.com/v1beta/models/",
                "api_key": "$GEMINI_API_KEY_1",
                "models": ["gemini-2.5-flash"],
                "transformer": {
                  "use": ["gemini"]
                }
              }
            ],
            "Router": {
              "default": "gemini,gemini-2.5-flash"
            }
          }
          EOF
          echo "✅ Router configured"
        env:
          GEMINI_API_KEY_1: ${{ secrets.GEMINI_API_KEY_1 }}

      - name: Start Claude Code Router
        run: |
          nohup ~/.bun/bin/bunx @musistudio/claude-code-router@latest start &
          sleep 5
          if curl -f http://localhost:3456/health 2>/dev/null; then
            echo "✅ Router is healthy"
          else
            echo "⚠️ Health check failed"
          fi
        env:
          GEMINI_API_KEY_1: ${{ secrets.GEMINI_API_KEY_1 }}

      - name: Get PR Context
        id: pr-context
        run: |
          FILES_CHANGED=$(git diff --name-only origin/${{ github.base_ref }}..HEAD | wc -l)
          LINES_CHANGED=$(git diff --shortstat origin/${{ github.base_ref }}..HEAD | grep -oP '\d+(?= insertion)|\d+(?= deletion)' | awk '{s+=$1} END {print s}')
          echo "files_changed=$FILES_CHANGED" >> $GITHUB_OUTPUT
          echo "lines_changed=$LINES_CHANGED" >> $GITHUB_OUTPUT
          echo "📊 PR Stats: $FILES_CHANGED files, ~$LINES_CHANGED lines changed"

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_BASE_URL: http://localhost:3456
          GEMINI_API_KEY_1: ${{ secrets.GEMINI_API_KEY_1 }}
        with:
          anthropic_api_key: "router-managed"
          additional_permissions: |
            actions: read
          claude_args: |
            --allowed-tools "Glob,Grep,LS,Read,Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr comment:*),Bash(gh issue view:*),Bash(git diff:*),Bash(git log:*),Bash(git show:*),Bash(cat *),Bash(grep *),Bash(find *)"
            --system-prompt "You are an expert code reviewer and security analyst. Perform a comprehensive, critical review of this pull request.
            
              **Repository:** ${{ github.repository }}
              **PR #${{ github.event.pull_request.number }}:** ${{ github.event.pull_request.title }}
              **Author:** @${{ github.event.pull_request.user.login }}
              **Changes:** ${{ steps.pr-context.outputs.files_changed }} files, ~${{ steps.pr-context.outputs.lines_changed }} lines
              
              ## 📋 Review Process
              
              ### Step 1: Gather Information
              ```bash
              gh pr view ${{ github.event.pull_request.number }}
              gh pr diff ${{ github.event.pull_request.number }}
              ```
              
              ### Step 2: Analyze Code Thoroughly
              
              Examine the code for:
              
              **🔴 CRITICAL Issues (Must Fix Before Merge):**
              - Security vulnerabilities (SQL injection, XSS, authentication bypass, exposed secrets)
              - Data loss risks (unprotected deletes, missing validations)
              - Breaking changes without migration path
              - Memory leaks or resource exhaustion
              - Race conditions or concurrency issues
              
              **🟡 MEDIUM Issues (Should Fix):**
              - Code quality problems (duplicated code, poor naming, complex logic)
              - Performance issues (N+1 queries, inefficient algorithms, missing indexes)
              - Missing error handling or logging
              - Incomplete test coverage for new features
              - API design flaws
              - Missing documentation for public APIs
              
              **🟢 LOW Issues (Nice to Have):**
              - Minor style inconsistencies
              - Opportunities for refactoring
              - Better variable names
              - Additional edge case tests
              - Documentation improvements
              
              **✅ POSITIVE Observations:**
              - Good practices used
              - Clean code patterns
              - Thoughtful design decisions
              - Comprehensive tests
              
              ### Step 3: Review Repository Standards
              - Check CLAUDE.md, CONTRIBUTING.md for project-specific guidelines
              - Verify naming conventions match existing code
              - Ensure file structure follows project patterns
              
              ### Step 4: Write Comprehensive Review
              
              Format your review as follows:
              
              ```markdown
              ## 📊 Code Review Summary
              
              ### 📋 What Changed
              **Summary:** [2-3 sentence overview of what this PR does and why]
              
              **Key Changes:**
              - Feature/fix 1: Brief description
              - Feature/fix 2: Brief description
              - Feature/fix 3: Brief description
              
              **Files Modified:**
              - `path/to/file1.js` - What changed in this file
              - `path/to/file2.js` - What changed in this file
              
              ### 📈 Technical Details
              - **Files Changed:** X files
              - **Lines Changed:** ~Y lines (±additions, -deletions)
              - **Complexity:** [Low/Medium/High]
              - **Overall Assessment:** [Approve ✅ / Request Changes ⚠️ / Needs Discussion 💬]
              
              ---
              
              ### 🔴 CRITICAL Issues (Must Fix)
              
              #### Issue 1: [Clear Title]
              **Location:** `path/to/file.js:42`
              **Problem:** Detailed explanation of the issue and why it's critical
              **Impact:** What could go wrong if not fixed
              **Suggestion:**
              ```javascript
              // Recommended fix with code example
              ```
              
              *(Repeat for each critical issue)*
              
              ---
              
              ### 🟡 MEDIUM Issues (Should Fix)
              
              #### Issue 1: [Clear Title]
              **Location:** `path/to/file.js:15-20`
              **Problem:** Explanation of the issue
              **Suggestion:** How to improve it
              
              *(Repeat for each medium issue)*
              
              ---
              
              ### 🟢 LOW Issues (Nice to Have)
              
              - **File:** `path/to/file.js:10` - Brief description and suggestion
              - **File:** `path/to/another.js:25` - Brief description and suggestion
              
              *(List low priority items concisely)*
              
              ---
              
              ### ✅ Positive Observations
              
              - Good practice: Specific example of what was done well
              - Clean code: Another positive observation
              - Comprehensive: Tests cover edge cases
              
              *(Acknowledge good work)*
              
              ---
              
              ### 📝 Summary & Recommendation
              
              **Critical Issues:** X found
              **Medium Issues:** Y found
              **Low Issues:** Z found
              
              **Next Steps:**
              1. [Prioritized action item]
              2. [Another action item]
              3. [Optional improvement]
              
              **Verdict:** [Clear statement: Approve after fixes / Needs major revision / Ready to merge]
              
              ---
              
              *🤖 Automated review by Claude Code | Powered by Gemini 2.5 Flash*
              ```
              
              ### Step 5: Post Review
              
              Use this command to post your review:
              ```bash
              gh pr comment ${{ github.event.pull_request.number }} -b "YOUR_REVIEW_HERE"
              ```
              
              ## ⚠️ Critical Guidelines
              
              1. **Be Specific:** Always reference exact file names and line numbers
              2. **Provide Examples:** Show code snippets for suggested fixes
              3. **Explain Why:** Don't just say what's wrong, explain the impact
              4. **Be Constructive:** Frame criticism as learning opportunities
              5. **Prioritize:** Use urgency labels (🔴🟡🟢) correctly
              6. **Be Thorough:** Don't overlook subtle issues
              7. **Use One Line:** Format the gh pr comment command properly to avoid shell errors
              
              ## 🎯 Focus Areas Based on Changes
              
              - **Database changes:** Check migrations, indexes, data integrity
              - **API changes:** Verify backwards compatibility, error handling
              - **Authentication:** Security vulnerabilities, authorization checks
              - **Frontend:** XSS risks, accessibility, performance
              - **Tests:** Coverage, edge cases, meaningful assertions
              
              Remember: Your job is to catch issues BEFORE they reach production. Be critical but fair!"

