name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set environment variables
        run: |
          echo "RUNNER_WORKSPACE=${{ github.workspace }}" >> $GITHUB_ENV
          echo "PATH=$HOME/.bun/bin:$PATH" >> $GITHUB_ENV
          echo "✓ Environment variables set"
          echo "  RUNNER_WORKSPACE=${{ github.workspace }}"
          echo "  PATH includes: $HOME/.bun/bin"

      - name: Create slash-commands directory
        run: |
          # Create the expected slash-commands directory path that the claude-code-action expects
          SLASH_COMMANDS_DIR="${RUNNER_WORKSPACE}/_actions/anthropics/claude-code-action/beta/slash-commands"
          echo "Checking for slash-commands directory: $SLASH_COMMANDS_DIR"
          
          if [ ! -d "$SLASH_COMMANDS_DIR" ]; then
            echo "Creating slash-commands directory..."
            mkdir -p "$SLASH_COMMANDS_DIR"
            echo "✓ Directory created: $SLASH_COMMANDS_DIR"
          else
            echo "✓ Directory already exists: $SLASH_COMMANDS_DIR"
          fi

      - name: Truncate large prompt files
        run: |
          # Find and truncate prompt/transcript files larger than 10KB to prevent Bun runtime errors
          MAX_SIZE=10000
          TRUNCATE_TO=8000
          
          echo "Scanning workspace for large prompt/transcript files..."
          find . -type f \( -iname "*prompt*" -o -iname "*transcript*" \) -size +${MAX_SIZE}c 2>/dev/null | while read -r file; do
            file_size=$(stat -f%z "$file" 2>/dev/null || stat -c%s "$file" 2>/dev/null)
            echo "⚠️  Found large file: $file (${file_size} bytes)"
            
            if [ "$file_size" -gt "$MAX_SIZE" ]; then
              # Create backup
              cp "$file" "${file}.bak"
              
              # Truncate the file
              head -c $TRUNCATE_TO "$file" > "${file}.tmp"
              echo -e "\n\n[CI NOTICE: File truncated from ${file_size} bytes to ${TRUNCATE_TO} bytes to prevent runtime errors]" >> "${file}.tmp"
              mv "${file}.tmp" "$file"
              
              new_size=$(stat -f%z "$file" 2>/dev/null || stat -c%s "$file" 2>/dev/null)
              echo "✓ Truncated $file from ${file_size} bytes to ${new_size} bytes"
            fi
          done
          
          echo "✓ Prompt file scan complete"

      - name: Setup Claude Code Router
        run: |
          curl -fsSL https://bun.sh/install | bash
          mkdir -p $HOME/.claude-code-router
          cat << 'EOF' > $HOME/.claude-code-router/config.json
          {
            "LOG": true,
            "LOG_LEVEL": "info",
            "NON_INTERACTIVE_MODE": true,
            "API_TIMEOUT_MS": 600000,
            "Providers": [
              {
                "name": "gemini",
                "api_base_url": "https://generativelanguage.googleapis.com/v1beta/models/",
                "api_key": "$GEMINI_API_KEY",
                "models": ["gemini-2.5-flash"],
                "transformer": {
                  "use": ["gemini"]
                }
              }
            ],
            "Router": {
              "default": "gemini,gemini-2.5-flash"
            }
          }
          EOF
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Start Claude Code Router
        run: |
          echo "Starting Claude Code Router..."
          echo "Bun path: $(which bunx || echo 'bunx not found in PATH')"
          nohup ~/.bun/bin/bunx @musistudio/claude-code-router@latest start &
          sleep 5
          if curl -f http://localhost:3456/health 2>/dev/null; then
            echo "✓ Claude Code Router health check passed"
          else
            echo "⚠️ Health check failed - router may not be running"
          fi
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Run Claude Code Assistant
        uses: anthropics/claude-code-action@beta
        env:
          ANTHROPIC_BASE_URL: http://localhost:3456
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        with:
          anthropic_api_key: "router-managed"
          additional_permissions: |
            actions: read
          allowed_tools: |
            Edit
            MultiEdit
            Glob
            Grep
            LS
            Read
            Write
            mcp__github_comment__update_claude_comment
            Bash(git add:*)
            Bash(git commit:*)
            Bash(git push:*)
            Bash(git status:*)
            Bash(git diff:*)
            Bash(git log:*)
            Bash(git show:*)
            Bash(git branch:*)
            Bash(git checkout:*)
            Bash(git fetch:*)
            Bash(gh *)
            Bash(npm install:*)
            Bash(npm ci:*)
            Bash(npm run:*)
            Bash(npm test:*)
            Bash(npm start:*)
            Bash(npm build:*)
            Bash(npm audit:*)
            Bash(npx *)
            Bash(yarn *)
            Bash(pnpm *)
            Bash(bun *)
            Bash(node *)
            Bash(cd *)
            Bash(ls *)
            Bash(pwd *)
            Bash(cat *)
            Bash(mkdir *)
            Bash(mv *)
            Bash(cp *)
            Bash(rm *)
            Bash(find *)
            Bash(grep *)
            Bash(echo *)
            Bash(head *)
            Bash(tail *)
            Bash(wc *)
            Bash(touch *)
            Bash(tree *)
          custom_instructions: |
            You are Claude, an AI assistant created by Anthropic, working as a coding assistant in a GitHub Actions environment.
            
            Key Guidelines:
            1. **Identity**: Always identify yourself as Claude when interacting with users
            2. **Communication**: Provide clear, detailed explanations of changes you make
            3. **Testing**: Run tests before committing changes when applicable
            4. **Commits**: Write clear, conventional commit messages
            5. **Safety**: Never delete important files without explicit confirmation
            6. **Dependencies**: Check package.json/requirements.txt before installing new packages
            7. **Error Handling**: If a command fails, explain why and suggest alternatives
            8. **Code Quality**: Follow existing code style and conventions
            9. **Documentation**: Update relevant docs when changing functionality
            10. **Collaboration**: Ask clarifying questions when requirements are ambiguous

            For large features:
            - Break work into logical commits
            - Test incrementally
            - Document as you go
            - Consider edge cases

            For bug fixes:
            - Reproduce the issue first
            - Identify root cause
            - Fix with minimal changes
            - Add tests to prevent regressio
